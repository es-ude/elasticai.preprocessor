name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Build package
        run: uv build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*